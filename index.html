<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0a1a" />
    <title>Soul Collection · Novels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="catalog">
        <div class="header-wrapper">
           
            <h1><i class="fas fa-book-open"></i> Soul Collection</h1>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="control-group">
                <label for="searchInput"><i class="fas fa-search"></i></label>
                <input type="text" id="searchInput" placeholder="Search novels..." aria-label="Search by novel name" />
            </div>

            <div class="control-group">
                <label for="categorySelect"><i class="fas fa-tag"></i></label>
                <select id="categorySelect" aria-label="Filter by genre">
                    <option value="all">All Genres</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sortSelect"><i class="fas fa-arrow-up-wide-short"></i></label>
                <select id="sortSelect" aria-label="Sort by price">
                    <option value="default">Default</option>
                    <option value="low">Price: Low → High</option>
                    <option value="high">Price: High → Low</option>
                </select>
            </div>

            <div class="results-count" id="resultsCount">
                <span id="countDisplay">0</span> novels
            </div>
        </div>

        <!-- Product grid -->
        <div class="product-grid" id="productGrid"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
